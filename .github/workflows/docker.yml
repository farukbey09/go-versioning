name: Build & Push Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]          # v1.0.0, v1.2.3-rc1 gibi tag'lerde de tetiklenir

env:
  REGISTRY: ghcr.io
  # github.repository = "kullaniciadi/repo-adi" formatında gelir
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # ghcr.io'ya yazma izni
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git describe için tüm tag geçmişi gerekir
          fetch-depth: 0

      # Versiyon bilgilerini hesapla
      - name: Compute version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "commit=$COMMIT"       >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Actions otomatik sağlar, secret eklemeye gerek yok

      # Image tag'lerini üret:
      #   - branch push → ghcr.io/user/repo:main  +  :sha-abc1234
      #   - tag push    → ghcr.io/user/repo:v1.0.0 + :latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Versiyon bilgilerini Dockerfile ARG olarak geç
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}
          # Layer cache — aynı repo'nun önceki build'inden faydalanır
          cache-from: type=gha
          cache-to: type=gha,mode=max
